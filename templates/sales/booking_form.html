{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header"><h1 class="page-title">{{ title }}</h1></div>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-gold px-4">Забронировать</button>
      <a href="{% url 'sales:bookings' %}" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
