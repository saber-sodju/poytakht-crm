{% extends 'base.html' %}
{% block title %}Новая бригада{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Новая бригада</h1>
  <a href="{% url 'workers:teams' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Назад
  </a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Название бригады *</label>
        <input type="text" name="name" class="form-control" placeholder="Бригада #1" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Объект</label>
        <select name="complex" class="form-select">
          <option value="">— Не привязана —</option>
          {% for c in complexes %}
          <option value="{{ c.pk }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Примечание</label>
        <textarea name="note" class="form-control" rows="2"></textarea>
      </div>
      <div class="d-flex gap-2 justify-content-end">
        <a href="{% url 'workers:teams' %}" class="btn btn-outline-secondary">Отмена</a>
        <button type="submit" class="btn btn-gold px-4">Создать</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
