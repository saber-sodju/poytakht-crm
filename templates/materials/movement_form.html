{% extends 'base.html' %}
{% block title %}Движение материала{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="bi bi-arrow-left-right"></i> Движение материала</h1>
  <a href="{% url 'materials:list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Назад
  </a>
</div>
<div class="card" style="max-width:640px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <!-- Direction toggle -->
        <div class="col-12">
          <label class="form-label fw-bold">Тип движения</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" name="direction" id="dir_in" value="in" checked>
            <label class="btn btn-outline-success btn-lg" for="dir_in">
              <i class="bi bi-arrow-down-circle"></i> Приход (получили)
            </label>
            <input type="radio" class="btn-check" name="direction" id="dir_out" value="out">
            <label class="btn btn-outline-danger btn-lg" for="dir_out">
              <i class="bi bi-arrow-up-circle"></i> Расход (отдали)
            </label>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold">Материал *</label>
          <select name="material" class="form-select form-select-lg" required>
            <option value="">— Выберите —</option>
            {% for m in materials %}
            <option value="{{ m.pk }}" {% if material and material.pk == m.pk %}selected{% endif %}>
              {{ m.name }} ({{ m.quantity|floatformat:1 }} {{ m.get_unit_display }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Количество *</label>
          <input type="number" name="quantity" class="form-control form-control-lg"
                 min="0.01" step="0.01" placeholder="0" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Цена за ед. ($)</label>
          <input type="number" name="price_per_unit" class="form-control"
                 min="0" step="0.01" value="0">
        </div>
        <div class="col-md-6">
          <label class="form-label">Поставщик</label>
          <select name="supplier" class="form-select">
            <option value="">— Не указан —</option>
            {% for s in suppliers %}
            <option value="{{ s.pk }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Блок/Объект</label>
          <select name="block" class="form-select">
            <option value="">— Не указан —</option>
            {% for b in blocks %}
            <option value="{{ b.pk }}">{{ b.complex.name }} — {{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Дата</label>
          <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Примечание</label>
          <textarea name="note" class="form-control" rows="2"></textarea>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end">
          <a href="{% url 'materials:list' %}" class="btn btn-outline-secondary">Отмена</a>
          <button type="submit" class="btn btn-gold px-4">
            <i class="bi bi-check-lg"></i> Записать движение
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
