{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ title }}</h1>
</div>
<div class="form-card">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-gold px-4">Сохранить</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
